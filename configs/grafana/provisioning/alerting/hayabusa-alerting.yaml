apiVersion: 1

groups:
  - orgId: 1
    name: Hayabusa MVP Alerts
    folder: Hayabusa
    interval: 1m
    rules:
      - uid: hayabusa-security-failed-login-burst
        title: Hayabusa Security Failed Login Burst
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: hayabusa-clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: hayabusa-clickhouse
              editorType: sql
              format: 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: timeseries
              rawSql: SELECT now() AS time, toFloat64(count()) AS value FROM security.alert_candidates WHERE ts > now() - INTERVAL 2 MINUTE AND rule_id = 'security_failed_login_burst'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: security_failed_login_burst candidates were produced in the last 2 minutes.
        labels:
          severity: medium
          service: detection
          rule_id: security_failed_login_burst
        isPaused: false
      - uid: hayabusa-windows-failed-logon-burst
        title: Hayabusa Windows Failed Logon Burst
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: hayabusa-clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: hayabusa-clickhouse
              editorType: sql
              format: 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: timeseries
              rawSql: SELECT now() AS time, toFloat64(count()) AS value FROM security.alert_candidates WHERE ts > now() - INTERVAL 5 MINUTE AND rule_id = 'windows_failed_logon_burst'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: windows_failed_logon_burst candidates were produced in the last 5 minutes.
        labels:
          severity: medium
          service: detection
          rule_id: windows_failed_logon_burst
        isPaused: false

contactPoints:
  - orgId: 1
    name: hayabusa-webhook
    receivers:
      - uid: hayabusa-webhook
        type: webhook
        settings:
          url: http://alert-sink:8080/alerts/default
          httpMethod: POST
          maxAlerts: 0
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: hayabusa-webhook
    group_by:
      - rule_id
      - severity
    group_wait: 1s
    group_interval: 30s
    repeat_interval: 15m
