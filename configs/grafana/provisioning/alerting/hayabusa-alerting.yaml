apiVersion: 1

groups:
  - orgId: 1
    name: Hayabusa Pipeline Alerts
    folder: Hayabusa
    interval: 1m
    rules:
      - uid: hayabusa-ingest-stall
        title: Hayabusa Ingest Stalled
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: hayabusa-clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: hayabusa-clickhouse
              editorType: sql
              format: 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: timeseries
              rawSql: SELECT now() AS time, count() AS value FROM security.events WHERE ts > now() - INTERVAL 2 MINUTE
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: No events ingested in the last 2 minutes.
          runbook: Check Vector container health, syslog ingress, and ClickHouse sink.
        labels:
          severity: warning
          service: ingestion
        isPaused: false
      - uid: hayabusa-events-storage-budget
        title: Hayabusa Events Storage Near Budget
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: hayabusa-clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: hayabusa-clickhouse
              editorType: sql
              format: 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: timeseries
              rawSql: SELECT now() AS time, toFloat64(ifNull(sum(bytes_on_disk), 0)) AS value FROM system.parts WHERE active AND database = 'security' AND table = 'events'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 966367641
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: security.events is above 90% of 1 GiB budget.
          runbook: Run scripts/storage-budget-guard.sh --enforce or reduce synthetic event rate.
        labels:
          severity: warning
          service: storage
        isPaused: false
      - uid: hayabusa-security-failed-login-burst
        title: Hayabusa Security Failed Login Burst
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: hayabusa-clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: hayabusa-clickhouse
              editorType: sql
              format: 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: timeseries
              rawSql: SELECT now() AS time, toFloat64(count()) AS value FROM security.alert_candidates WHERE ts > now() - INTERVAL 2 MINUTE AND rule_id = 'security_failed_login_burst'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: security_failed_login_burst detection candidates were produced in the last 2 minutes.
          runbook: Review `security.alert_candidates` and recent `security.events` auth messages for source validation.
        labels:
          severity: medium
          service: detection
          rule_id: security_failed_login_burst
        isPaused: false

contactPoints:
  - orgId: 1
    name: hayabusa-default-webhook
    receivers:
      - uid: hayabusa-default-webhook
        type: webhook
        settings:
          url: http://alert-sink:8080/alerts/default
          httpMethod: POST
          maxAlerts: 0
        disableResolveMessage: false

  - orgId: 1
    name: hayabusa-detection-webhook
    receivers:
      - uid: hayabusa-detection-webhook
        type: webhook
        settings:
          url: http://alert-sink:8080/alerts/detection
          httpMethod: POST
          maxAlerts: 0
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: hayabusa-default-webhook
    group_by:
      - service
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: hayabusa-detection-webhook
        object_matchers:
          - - service
            - =
            - detection
        group_by:
          - rule_id
          - severity
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 30m
