platform:
  environment: local
  site: primary
  timezone: UTC

schema:
  canonical_event_version: hayabusa.event.v1
  canonical_event_contract_file: ./configs/global/event-schema-v1.yaml

network:
  nats_url: nats://nats:4222
  clickhouse_url: http://clickhouse:8123

transport:
  nats_stream_name: HAYABUSA_EVENTS
  nats_subject: hayabusa.events.normalized
  nats_consumer_name: VECTOR_CLICKHOUSE_WRITER
  nats_stream_max_bytes: 268435456
  nats_stream_max_age: 24h

storage:
  clickhouse_database: security
  retention_hot_days: 7

observability:
  log_level: info
  metrics_enabled: true

collection:
  fluent_bit_forward_port: 24224
  host_log_path: ./data/host-logs

endpoint_management:
  inventory_view: security.endpoint_activity
  default_windows_lane: vector-windows-endpoint
  windows_policy_file: ./configs/endpoints/windows-endpoints.yaml
  status_active_minutes: 15
  status_idle_minutes: 60
