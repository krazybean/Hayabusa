schema:
  id: hayabusa.event
  version: v1
  version_string: hayabusa.event.v1
  owner: hayabusa
  status: active
  description: >
    Canonical normalized event contract for security.events in the local MVP.
    Anchor columns are stable; source-specific values remain in fields map.

anchors:
  - name: ts
    type: DateTime64(3, UTC)
    required: true
    description: Event timestamp normalized to UTC with millisecond precision.
  - name: event_id
    type: UUID
    required: true
    description: Event deduplication key generated by ClickHouse.
  - name: platform
    type: LowCardinality(String)
    required: true
    description: Deployment tag (for example local-mvp).
  - name: schema_version
    type: LowCardinality(String)
    required: true
    description: Canonical schema contract string for this event.
  - name: ingest_source
    type: LowCardinality(String)
    required: true
    description: Normalized source lane (for example vector-syslog).
  - name: message
    type: String
    required: true
    description: Human-readable normalized message.
  - name: fields
    type: Map(String, String)
    required: true
    description: Source-specific attributes as key/value pairs.

recommended_fields:
  - key: schema_version
    description: Duplicate of anchor for map-level compatibility during transition.
  - key: hostname
    description: Syslog host when available.
  - key: appname
    description: Syslog appname when available.
  - key: computer
    description: Windows computer name when available.
  - key: event_id
    description: Source event identifier (for example Windows EventID).
  - key: channel
    description: Source channel when available.
  - key: provider_name
    description: Event provider when available.
  - key: severity
    description: Source severity level when available.

versioning_policy:
  major_breaking_change:
    action: increment version (v1 -> v2)
    examples:
      - remove/rename anchor column
      - change anchor semantic meaning
      - change anchor type incompatibly
  minor_non_breaking_change:
    action: keep version string; document addition
    examples:
      - add new optional fields map key
      - add new ingest_source value
