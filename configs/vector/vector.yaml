api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  demo_logs:
    type: demo_logs
    format: syslog
    interval: 1

  # Dedicated auth-validation lane. These files are loaded by repo-local helper
  # scripts and are kept separate from the generic demo stream on purpose.
  synthetic_auth_files:
    type: file
    include:
      - /var/lib/hayabusa/synthetic-auth/*.jsonl
    read_from: beginning

  ingest_syslog_tcp:
    type: syslog
    address: 0.0.0.0:1514
    mode: tcp

  ingest_syslog_udp:
    type: syslog
    address: 0.0.0.0:1514
    mode: udp

  ingest_fluent_windows_forward:
    type: fluent
    mode: tcp
    address: 0.0.0.0:24225
    connection_limit: 50

transforms:
  normalize_generic:
    type: remap
    inputs:
      - demo_logs
      - ingest_syslog_tcp
      - ingest_syslog_udp
      - ingest_fluent_windows_forward
    source: |
      if exists(.timestamp) {
        .ts = format_timestamp!(del(.timestamp), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      } else {
        .ts = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      }

      .platform = "local-mvp"
      .schema_version = "hayabusa.event.v1"

      if exists(.source_type) {
        .ingest_source = "vector-" + to_string!(.source_type)
      } else {
        .ingest_source = "vector-syslog"
      }
      if exists(.source_type) && to_string!(.source_type) == "fluent" {
        .ingest_source = "vector-fluent"
        if exists(.tag) && to_string!(.tag) == "windows.events" {
          .ingest_source = "vector-windows-endpoint"
        }
      }

      if !exists(.message) {
        if exists(.log) {
          .message = to_string!(.log)
        } else if exists(.msg) {
          .message = to_string!(.msg)
        } else if exists(.Message) {
          .message = to_string!(.Message)
        } else {
          .message = "normalized event (no source message field)"
        }
      } else {
        .message = to_string!(.message)
      }

      fields = {}
      if exists(.hostname)  { fields.hostname  = to_string!(.hostname) }
      if exists(.appname)   { fields.appname   = to_string!(.appname) }
      if exists(.severity)  { fields.severity  = to_string!(.severity) }
      if exists(.facility)  { fields.facility  = to_string!(.facility) }
      if exists(.procid)    { fields.procid    = to_string!(.procid) }
      if exists(.msgid)     { fields.msgid     = to_string!(.msgid) }
      if exists(.tag)       { fields.tag       = to_string!(.tag) }
      if exists(.collector) { fields.collector = to_string!(.collector) }
      if exists(.host_collection) { fields.host_collection = to_string!(.host_collection) }
      if exists(.host)      { fields.host      = to_string!(.host) }
      if exists(.Channel)   { fields.channel   = to_string!(.Channel) }
      if exists(.channel)   { fields.channel   = to_string!(.channel) }
      if exists(.Computer)  { fields.computer  = to_string!(.Computer) }
      if exists(.computer)  { fields.computer  = to_string!(.computer) }
      if exists(.EventID)   { fields.event_id  = to_string!(.EventID) }
      if exists(.event_id)  { fields.event_id  = to_string!(.event_id) }
      if exists(.Level)     { fields.level     = to_string!(.Level) }
      if exists(.level)     { fields.level     = to_string!(.level) }
      if exists(.ProviderName) { fields.provider_name = to_string!(.ProviderName) }
      if exists(.provider_name) { fields.provider_name = to_string!(.provider_name) }
      if exists(.schema_version) { fields.schema_version = to_string!(.schema_version) }
      .fields = fields

      del(.hostname)
      del(.appname)
      del(.severity)
      del(.facility)
      del(.procid)
      del(.msgid)
      del(.tag)
      del(.collector)
      del(.host_collection)
      del(.host)
      del(.Channel)
      del(.channel)
      del(.Computer)
      del(.computer)
      del(.EventID)
      del(.event_id)
      del(.Level)
      del(.level)
      del(.ProviderName)
      del(.provider_name)

  normalize_synthetic_auth:
    type: remap
    inputs:
      - synthetic_auth_files
    source: |
      # Synthetic auth events deliberately use the same envelope as real auth
      # telemetry so detections can be validated before live collectors arrive.
      payload = parse_json!(to_string!(.message))

      if exists(payload.timestamp) {
        .ts = format_timestamp!(parse_timestamp!(to_string!(payload.timestamp), format: "%+"), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      } else {
        .ts = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      }

      if exists(payload.platform) {
        .platform = downcase(to_string!(payload.platform))
      } else {
        .platform = "synthetic-auth"
      }

      .schema_version = "hayabusa.event.v1"
      .ingest_source = "synthetic-auth"

      if exists(payload.message) {
        .message = to_string!(payload.message)
      } else {
        .message = "synthetic auth event"
      }

      fields = {}
      fields.event_type = "login"

      if exists(payload.user) {
        fields.user = to_string!(payload.user)
      } else {
        fields.user = ""
      }

      if exists(payload.src_ip) {
        fields.src_ip = to_string!(payload.src_ip)
      } else {
        fields.src_ip = ""
      }

      if exists(payload.host) {
        fields.host = to_string!(payload.host)
      } else {
        fields.host = ""
      }

      if exists(payload.status) {
        fields.status = downcase(to_string!(payload.status))
      } else {
        fields.status = ""
      }

      if exists(payload.source_kind) {
        fields.source_kind = to_string!(payload.source_kind)
      } else if .platform == "windows" {
        fields.source_kind = "windows_auth"
      } else {
        fields.source_kind = "linux_ssh"
      }

      if exists(payload.raw_event_id) {
        fields.raw_event_id = to_string!(payload.raw_event_id)
      } else {
        fields.raw_event_id = ""
      }

      if exists(payload.logon_type) {
        fields.logon_type = to_string!(payload.logon_type)
      } else {
        fields.logon_type = ""
      }

      if exists(payload.domain) {
        fields.domain = to_string!(payload.domain)
      } else {
        fields.domain = ""
      }

      if exists(payload.auth_method) {
        fields.auth_method = to_string!(payload.auth_method)
      } else {
        fields.auth_method = ""
      }

      if exists(payload.collector_name) {
        fields.collector_name = to_string!(payload.collector_name)
      } else {
        fields.collector_name = "hayabusa-sim"
      }

      if exists(payload.scenario) {
        fields.scenario = to_string!(payload.scenario)
      }

      fields.schema_version = .schema_version
      .fields = fields

      del(.file)
      del(.source_type)

sinks:
  nats_events_buffer:
    type: nats
    inputs:
      - normalize_generic
      - normalize_synthetic_auth
    url: nats://nats:4222
    subject: security.events
    encoding:
      codec: json
    jetstream:
      enabled: true
