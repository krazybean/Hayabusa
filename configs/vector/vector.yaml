api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  demo_logs:
    type: demo_logs
    format: syslog
    interval: 1

  # External syslog ingress (host/remote feed can send to port 1514).
  ingest_syslog_tcp:
    type: syslog
    address: 0.0.0.0:1514
    mode: tcp

  ingest_syslog_udp:
    type: syslog
    address: 0.0.0.0:1514
    mode: udp

  # Fluent Bit forward input for host-collector traffic.
  ingest_fluent_forward:
    type: fluent
    address: 0.0.0.0:24224

  # Buffered normalized events pulled back from JetStream before storage.
  buffered_events:
    type: nats
    connection_name: vector-buffer-reader
    url: nats://nats:4222
    subject: hayabusa.events.normalized
    decoding:
      codec: json
    jetstream:
      stream: HAYABUSA_EVENTS
      consumer: VECTOR_CLICKHOUSE_WRITER

transforms:
  normalize:
    type: remap
    inputs:
      - demo_logs
      - ingest_syslog_tcp
      - ingest_syslog_udp
      - ingest_fluent_forward
    source: |
      # Stable anchor fields
      # ClickHouse DateTime64 JSON parsing rejects RFC3339 trailing "Z" in this setup.
      # Normalize to "YYYY-MM-DD HH:MM:SS.mmm" before insert.
      if exists(.timestamp) {
        .ts = format_timestamp!(del(.timestamp), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      } else {
        .ts = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      }
      .platform = "local-mvp"
      if exists(.source_type) {
        .ingest_source = "vector-" + to_string!(.source_type)
      } else {
        .ingest_source = "vector-syslog"
      }
      if exists(.source_type) && to_string!(.source_type) == "fluent" {
        .ingest_source = "vector-fluent"
      }

      # Ensure required message anchor column is always present.
      if !exists(.message) {
        if exists(.log) {
          .message = to_string!(.log)
        } else if exists(.msg) {
          .message = to_string!(.msg)
        } else {
          .message = "normalized event (no source message field)"
        }
      } else {
        .message = to_string!(.message)
      }

      # Collect all variable source fields into the Map(String, String) column.
      # Coerce to string so ClickHouse accepts them without type errors.
      # Update this block when the ingest source format changes.
      fields = {}
      if exists(.hostname)  { fields.hostname  = to_string!(.hostname) }
      if exists(.appname)   { fields.appname   = to_string!(.appname) }
      if exists(.severity)  { fields.severity  = to_string!(.severity) }
      if exists(.facility)  { fields.facility  = to_string!(.facility) }
      if exists(.procid)    { fields.procid    = to_string!(.procid) }
      if exists(.msgid)     { fields.msgid     = to_string!(.msgid) }
      if exists(.tag)       { fields.tag       = to_string!(.tag) }
      if exists(.collector) { fields.collector = to_string!(.collector) }
      if exists(.host_collection) { fields.host_collection = to_string!(.host_collection) }
      .fields = fields

      # Remove top-level source fields now captured in the map
      del(.hostname)
      del(.appname)
      del(.severity)
      del(.facility)
      del(.procid)
      del(.msgid)
      del(.tag)
      del(.collector)
      del(.host_collection)

sinks:
  # Buffer sink — writes normalized events into NATS JetStream.
  nats_events_buffer:
    type: nats
    inputs:
      - normalize
    url: nats://nats:4222
    subject: hayabusa.events.normalized
    encoding:
      codec: json
    jetstream:
      enabled: true

  # ClickHouse sink — writes buffered events to security.events
  clickhouse_events:
    type: clickhouse
    inputs:
      - buffered_events
    endpoint: http://clickhouse:8123
    database: security
    table: events
    skip_unknown_fields: true  # drop any fields not in the table schema

  # Console sink — kept for local debugging, shows the buffered event.
  console:
    type: console
    inputs:
      - buffered_events
    encoding:
      codec: json
