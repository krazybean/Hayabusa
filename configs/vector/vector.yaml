api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  demo_logs:
    type: demo_logs
    format: syslog
    interval: 1

  ingest_syslog_tcp:
    type: syslog
    address: 0.0.0.0:1514
    mode: tcp

  ingest_syslog_udp:
    type: syslog
    address: 0.0.0.0:1514
    mode: udp

  buffered_events:
    type: nats
    connection_name: vector-buffer-reader
    url: nats://nats:4222
    subject: hayabusa.events.normalized
    decoding:
      codec: json
    jetstream:
      stream: HAYABUSA_EVENTS
      consumer: VECTOR_CLICKHOUSE_WRITER

transforms:
  normalize:
    type: remap
    inputs:
      - demo_logs
      - ingest_syslog_tcp
      - ingest_syslog_udp
    source: |
      if exists(.timestamp) {
        .ts = format_timestamp!(del(.timestamp), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      } else {
        .ts = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S%.3f", timezone: "UTC")
      }

      .platform = "local-mvp"
      .schema_version = "hayabusa.event.v1"

      if exists(.source_type) {
        .ingest_source = "vector-" + to_string!(.source_type)
      } else {
        .ingest_source = "vector-syslog"
      }

      if !exists(.message) {
        if exists(.log) {
          .message = to_string!(.log)
        } else if exists(.msg) {
          .message = to_string!(.msg)
        } else if exists(.Message) {
          .message = to_string!(.Message)
        } else {
          .message = "normalized event (no source message field)"
        }
      } else {
        .message = to_string!(.message)
      }

      fields = {}
      if exists(.hostname)  { fields.hostname  = to_string!(.hostname) }
      if exists(.appname)   { fields.appname   = to_string!(.appname) }
      if exists(.severity)  { fields.severity  = to_string!(.severity) }
      if exists(.facility)  { fields.facility  = to_string!(.facility) }
      if exists(.procid)    { fields.procid    = to_string!(.procid) }
      if exists(.msgid)     { fields.msgid     = to_string!(.msgid) }
      if exists(.schema_version) { fields.schema_version = to_string!(.schema_version) }
      .fields = fields

      del(.hostname)
      del(.appname)
      del(.severity)
      del(.facility)
      del(.procid)
      del(.msgid)

sinks:
  nats_events_buffer:
    type: nats
    inputs:
      - normalize
    url: nats://nats:4222
    subject: hayabusa.events.normalized
    encoding:
      codec: json
    jetstream:
      enabled: true

  clickhouse_events:
    type: clickhouse
    inputs:
      - buffered_events
    endpoint: http://clickhouse:8123
    database: security
    table: events
    skip_unknown_fields: true

  console:
    type: console
    inputs:
      - buffered_events
    encoding:
      codec: json
