# Example only: merge these fields into `sources.ingest_fluent_windows_forward`
# in configs/vector/vector.yaml when enabling mTLS for real Windows endpoints.
#
# Requires generated certs mounted at:
#   /etc/vector/tls/windows-forward
#
# Generate with:
#   ./scripts/generate-windows-forward-certs.sh

mode: tcp
address: 0.0.0.0:24225
connection_limit: 200
permit_origin:
  - 10.0.10.0/24
  - 10.0.20.0/24
tls:
  enabled: true
  verify_certificate: true
  ca_file: /etc/vector/tls/windows-forward/ca.crt
  crt_file: /etc/vector/tls/windows-forward/server.crt
  key_file: /etc/vector/tls/windows-forward/server.key
  client_metadata_key: tls_client
