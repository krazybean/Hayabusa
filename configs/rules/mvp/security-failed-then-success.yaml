id: security_failed_then_success
name: Failed Then Success
description: Detect repeated failed logins followed by a successful login for the same account and source IP.
alert_type: fail_then_success
severity: high
enabled: true
threshold_op: gte
threshold_value: 3
threshold_failures: 3
window_minutes: 15
cooldown_seconds: 300
suppression_computer_expr: "lowerUTF8(endpoint_id)"
suppression_user_expr: "lowerUTF8(principal)"
