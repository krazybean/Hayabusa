id: windows_failed_logon_burst
name: Windows Failed Logon Burst
description: Detect repeated Windows failed logons from one real endpoint in the last 5 minutes.
alert_type: windows_failed_logon_burst
severity: medium
enabled: true
threshold_op: gte
threshold_value: 5
window_minutes: 5
cooldown_seconds: 300
suppression_computer_expr: "lowerUTF8(endpoint_id)"
suppression_user_expr: "''"
