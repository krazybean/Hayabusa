id: security_source_multi_user_burst
name: Password Spray
description: Detect one source IP failing logins against multiple usernames in a short window.
alert_type: password_spray
severity: high
enabled: true
threshold_op: gte
threshold_value: 4
threshold_attempts: 4
threshold_distinct_users: 3
window_minutes: 10
cooldown_seconds: 300
suppression_computer_expr: "lowerUTF8(endpoint_id)"
suppression_user_expr: "''"
