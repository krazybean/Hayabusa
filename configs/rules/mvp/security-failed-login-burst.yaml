id: security_failed_login_burst
name: Security Failed Login Burst
description: Detect repeated failed logins from syslog-style messages in the last minute.
alert_type: failed_login_burst
severity: medium
enabled: true
threshold_op: gte
threshold_value: 5
window_minutes: 5
cooldown_seconds: 300
suppression_computer_expr: "lowerUTF8(endpoint_id)"
suppression_user_expr: "lowerUTF8(principal)"
