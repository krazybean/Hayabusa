id: security_user_multi_source_burst
name: Distributed Attack
description: Detect one account receiving repeated failed logins from multiple source IPs.
alert_type: distributed_attack
severity: high
enabled: true
threshold_op: gte
threshold_value: 4
threshold_attempts: 4
threshold_distinct_ips: 3
window_minutes: 10
cooldown_seconds: 300
suppression_computer_expr: "lowerUTF8(endpoint_id)"
suppression_user_expr: "lowerUTF8(principal)"
