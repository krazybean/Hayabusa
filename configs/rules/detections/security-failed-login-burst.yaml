id: security_failed_login_burst
name: Security Failed Login Burst
description: Detect repeated authentication failures from syslog-like messages.
severity: medium
enabled: true
threshold_op: gte
threshold_value: 3
query: |
  SELECT count()
  FROM security.events
  WHERE ts > now() - INTERVAL 1 MINUTE
    AND (
      positionCaseInsensitive(message, 'failed password') > 0
      OR positionCaseInsensitive(message, 'authentication failure') > 0
      OR positionCaseInsensitive(message, 'failed login') > 0
      OR positionCaseInsensitive(message, 'invalid user') > 0
    )
