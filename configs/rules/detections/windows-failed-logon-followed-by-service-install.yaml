id: windows_failed_logon_followed_by_service_install
name: Windows Failed Logon Followed by Service Install
description: Detect hosts where failed logons (4625) are followed by service install events (4697/7045) within 15 minutes.
severity: high
enabled: true
threshold_op: gte
threshold_value: 1
cooldown_seconds: 900
suppression_computers_csv: win-local-sim
suppression_computer_expr: lowerUTF8(ifNull(install.fields['computer'], ''))
query: |
  SELECT count()
  FROM (
    SELECT install.fields['computer'] AS computer
    FROM security.events AS install
    INNER JOIN security.events AS fail
      ON fail.fields['computer'] = install.fields['computer']
      AND fail.ingest_source = 'vector-windows-endpoint'
      AND fail.fields['event_id'] = '4625'
      AND fail.ts <= install.ts
      AND fail.ts >= install.ts - INTERVAL 15 MINUTE
    WHERE install.ts > now() - INTERVAL 20 MINUTE
      AND install.ingest_source = 'vector-windows-endpoint'
      AND install.fields['event_id'] IN ('4697', '7045')
      AND install.fields['computer'] != ''
      AND {{SUPPRESSION_CONDITION}}
    GROUP BY computer
  )
