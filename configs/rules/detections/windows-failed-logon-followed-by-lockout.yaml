id: windows_failed_logon_followed_by_lockout
name: Windows Failed Logon Followed by Lockout
description: Detect hosts where failed logons (4625) are followed by account lockout (4740) within 10 minutes.
severity: high
enabled: true
threshold_op: gte
threshold_value: 1
cooldown_seconds: 600
query: |
  SELECT count()
  FROM (
    SELECT lock.fields['computer'] AS computer
    FROM security.events AS lock
    INNER JOIN security.events AS fail
      ON fail.fields['computer'] = lock.fields['computer']
      AND fail.ingest_source = 'vector-windows-endpoint'
      AND fail.fields['event_id'] = '4625'
      AND fail.ts <= lock.ts
      AND fail.ts >= lock.ts - INTERVAL 10 MINUTE
    WHERE lock.ts > now() - INTERVAL 15 MINUTE
      AND lock.ingest_source = 'vector-windows-endpoint'
      AND lock.fields['event_id'] = '4740'
      AND lock.fields['computer'] != ''
    GROUP BY computer
  )
