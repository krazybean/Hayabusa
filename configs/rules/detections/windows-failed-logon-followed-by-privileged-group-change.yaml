id: windows_failed_logon_followed_by_privileged_group_change
name: Windows Failed Logon Followed by Privileged Group Change
description: Detect hosts where failed logons (4625) are followed by privileged group membership changes (4728/4732/4756) within 15 minutes.
severity: high
enabled: true
threshold_op: gte
threshold_value: 1
cooldown_seconds: 900
suppression_computer_expr: lowerUTF8(ifNull(grp.fields['computer'], ''))
query: |
  SELECT count()
  FROM (
    SELECT grp.fields['computer'] AS computer
    FROM security.events AS grp
    INNER JOIN security.events AS fail
      ON fail.fields['computer'] = grp.fields['computer']
      AND fail.ingest_source = 'vector-windows-endpoint'
      AND fail.fields['event_id'] = '4625'
      AND fail.ts <= grp.ts
      AND fail.ts >= grp.ts - INTERVAL 15 MINUTE
    WHERE grp.ts > now() - INTERVAL 20 MINUTE
      AND grp.ingest_source = 'vector-windows-endpoint'
      AND grp.fields['event_id'] IN ('4728', '4732', '4756')
      AND grp.fields['computer'] != ''
      AND {{SUPPRESSION_CONDITION}}
    GROUP BY computer
  )
