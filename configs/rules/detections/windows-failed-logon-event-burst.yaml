id: windows_failed_logon_event_burst
name: Windows Failed Logon Event Burst
description: Detect repeated Windows failed logon EventID 4625 activity from endpoint lane traffic.
severity: high
enabled: true
threshold_op: gte
threshold_value: 3
cooldown_seconds: 300
query: |
  SELECT count()
  FROM security.events
  WHERE ts > now() - INTERVAL 5 MINUTE
    AND ingest_source = 'vector-windows-endpoint'
    AND fields['event_id'] = '4625'
    AND {{SUPPRESSION_CONDITION}}
