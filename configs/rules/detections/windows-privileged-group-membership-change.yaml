id: windows_privileged_group_membership_change
name: Windows Privileged Group Membership Change
description: Detect additions to security-enabled groups (4728/4732/4756).
severity: high
enabled: true
threshold_op: gte
threshold_value: 1
cooldown_seconds: 900
suppression_computers_csv: win-local-sim
query: |
  SELECT count()
  FROM security.events
  WHERE ts > now() - INTERVAL 15 MINUTE
    AND ingest_source = 'vector-windows-endpoint'
    AND fields['event_id'] IN ('4728', '4732', '4756')
    AND {{SUPPRESSION_CONDITION}}
