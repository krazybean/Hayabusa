[SERVICE]
    Flush           1
    Daemon          Off
    Log_Level       info
    HTTP_Server     On
    HTTP_Listen     127.0.0.1
    HTTP_Port       2020

[INPUT]
    Name            winevtlog
    Channels        Application,System,Security
    Interval_Sec    1
    DB              C:\fluent-bit\state\winevtlog.db
    Read_Existing_Events  True
    Tag             windows.events

[FILTER]
    Name            record_modifier
    Match           windows.events
    Record          collector fluent-bit-windows
    Record          host_collection windows-eventlog

[OUTPUT]
    Name            forward
    Match           windows.events
    Host            HAYABUSA_VECTOR_HOST
    Port            24225
    Retry_Limit     False
    tls             On
    tls.verify      On
    tls.ca_file     C:\fluent-bit\certs\ca.crt
    tls.crt_file    C:\fluent-bit\certs\client.crt
    tls.key_file    C:\fluent-bit\certs\client.key
