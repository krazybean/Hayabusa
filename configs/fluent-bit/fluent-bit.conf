[SERVICE]
    Flush           1
    Daemon          Off
    Log_Level       info

[INPUT]
    Name            tail
    Path            /var/log/hayabusa-host/*.log
    Tag             host.logs
    Read_from_Head  true
    Refresh_Interval 2
    DB              /tmp/flb_tail.db
    Mem_Buf_Limit   5MB

[FILTER]
    Name            record_modifier
    Match           host.logs
    Record          collector fluent-bit
    Record          host_collection linux-file-tail

[OUTPUT]
    Name            forward
    Match           host.logs
    Host            vector
    Port            24224
    Retry_Limit     False
