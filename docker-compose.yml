services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2.5.45@sha256:8f18d3c681eb07d5f28ac3fd6e1cc4789cb1cb4f9823d52ba8026df49960184b
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./configs/clickhouse/config.xml:/etc/clickhouse-server/config.d/local-config.xml:ro
      - ./configs/clickhouse/users.xml:/etc/clickhouse-server/users.d/local-users.xml:ro
      - ./configs/clickhouse/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: security
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.12.6@sha256:24e20d33a7214208b1cb699c2e4ebfbed32f7a30b41c18b36be75f019a96616c
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      # Distroless image: no shell/curl/wget available inside container.
      test: ["CMD", "/nats-server", "--version"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats-init:
    image: natsio/nats-box:0.3.1@sha256:fbdf67cb49333afc50e2003c6857845d1ed9cf822d2b886cc5658ebf3c754b07
    container_name: nats-init
    command: ["/bin/sh", "/app/bootstrap-jetstream.sh"]
    environment:
      NATS_URL: nats://nats:4222
      NATS_STREAM_NAME: HAYABUSA_EVENTS
      NATS_STREAM_SUBJECTS: "events.auth,security.events"
      NATS_CONSUMER_NAME: HAYABUSA_INGEST
      NATS_STREAM_MAX_BYTES: "268435456"
      NATS_STREAM_MAX_AGE: 24h
    volumes:
      - ./scripts/bootstrap-jetstream.sh:/app/bootstrap-jetstream.sh:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: "no"

  vector:
    image: timberio/vector:0.54.0-alpine@sha256:bbc59e9d5a6cf432f11d912911a6ac63784527d978626cff783152c2bb2ee1a9
    container_name: vector
    ports:
      - "8686:8686"
      - "1514:1514"
      - "1514:1514/udp"
      - "24225:24225"
    volumes:
      - ./configs/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./data/synthetic-auth:/var/lib/hayabusa/synthetic-auth
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # Vector API listens on IPv4 in this image; use 127.0.0.1 to avoid ::1 refusal.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8686/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  hayabusa-ingest:
    build:
      context: ./services/hayabusa-ingest
    container_name: hayabusa-ingest
    environment:
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: security.events
      NATS_STREAM: HAYABUSA_EVENTS
      NATS_CONSUMER: HAYABUSA_INGEST
      CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      CLICKHOUSE_DATABASE: security
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:12.4.2@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_PLUGINS_PREINSTALL: grafana-clickhouse-datasource@4.14.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      hayabusa-ingest:
        condition: service_started
      alert-sink:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: node:22.22.2-alpine
    container_name: hayabusa-api
    command: ["node", "/app/server.js"]
    ports:
      - "8080:8080"
    environment:
      API_PORT: "8080"
      CLICKHOUSE_URL: http://clickhouse:8123
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: security.events
      TEST_EVENT_BURST_COUNT: "5"
    volumes:
      - ./services/api/server.js:/app/server.js:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    image: node:22.22.2-alpine
    container_name: hayabusa-web
    command: ["node", "/app/server.js"]
    ports:
      - "3000:3000"
    environment:
      WEB_PORT: "3000"
    volumes:
      - ./apps/web:/app:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  detection:
    image: curlimages/curl:8.18.0@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    container_name: detection
    command: ["/bin/sh", "/app/run.sh"]
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123/
      RULE_DIR: /etc/hayabusa/rules
      DETECTION_POLL_SECONDS: "5"
    volumes:
      - ./services/detection/run.sh:/app/run.sh:ro
      - ./configs/rules/mvp:/etc/hayabusa/rules:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      vector:
        condition: service_healthy
      hayabusa-ingest:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /tmp/detection-heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  alert-sink:
    image: node:22.22.2-alpine
    container_name: alert-sink
    command: ["node", "/app/server.js"]
    ports:
      - "5678:8080"
    environment:
      ALERT_ROUTER_LISTEN_PORT: "8080"
      ALERT_ROUTER_EXTERNAL_WEBHOOK_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_TOKEN_FILE:-}
      ALERT_ROUTER_FAIL_ON_FORWARD_ERROR: ${HAYABUSA_ALERT_ROUTER_FAIL_ON_FORWARD_ERROR:-false}
      ALERT_ROUTER_FORWARD_TIMEOUT_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_TIMEOUT_MS:-5000}
      ALERT_ROUTER_FORWARD_RETRY_MAX_ATTEMPTS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_MAX_ATTEMPTS:-3}
      ALERT_ROUTER_FORWARD_RETRY_BASE_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_BASE_MS:-500}
      ALERT_ROUTER_FORWARD_RETRY_MAX_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_MAX_MS:-5000}
    volumes:
      - ./services/alert-router/server.js:/app/server.js:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  clickhouse_data:
  nats_data:
  grafana_data:
