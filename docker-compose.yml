services:
  # Columnar event store (single-node for local MVP).
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./configs/clickhouse/config.xml:/etc/clickhouse-server/config.d/local-config.xml:ro
      - ./configs/clickhouse/users.xml:/etc/clickhouse-server/users.d/local-users.xml:ro
      - ./configs/clickhouse/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: security
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Coordination service reserved for future ClickHouse clustering.
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:latest
    container_name: clickhouse-keeper
    ports:
      - "9181:9181"
      - "9234:9234"
    volumes:
      - keeper_data:/var/lib/clickhouse-keeper
      - ./configs/clickhouse/keeper.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-keeper-client", "--host", "localhost", "--port", "9181", "ls", "/"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Transport/buffer layer (active in ingest flow).
  nats:
    image: nats:latest
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      # Distroless image: no shell/curl/wget available inside container.
      test: ["CMD", "/nats-server", "--version"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # JetStream bootstrap (idempotent stream + durable consumer setup).
  nats-init:
    image: natsio/nats-box:latest
    container_name: nats-init
    command: ["/bin/sh", "/app/bootstrap-jetstream.sh"]
    environment:
      NATS_URL: nats://nats:4222
      NATS_STREAM_NAME: HAYABUSA_EVENTS
      NATS_STREAM_SUBJECTS: "hayabusa.events.>"
      NATS_CONSUMER_NAME: VECTOR_CLICKHOUSE_WRITER
      NATS_STREAM_MAX_BYTES: "268435456"
      NATS_STREAM_MAX_AGE: 24h
    volumes:
      - ./scripts/bootstrap-jetstream.sh:/app/bootstrap-jetstream.sh:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: "no"

  # Ingestion + normalization pipeline (normalize -> JetStream -> store).
  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    ports:
      - "8686:8686"
      - "1514:1514"
      - "1514:1514/udp"
      - "24224:24224"
      - "24225:24225"
    volumes:
      - ./configs/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./secrets/windows-forward-tls:/etc/vector/tls/windows-forward:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # Vector API listens on IPv4 in this image; use 127.0.0.1 to avoid ::1 refusal.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8686/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Host-side collector (Fluent Bit -> Vector forward input).
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    volumes:
      - ./configs/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./data/host-logs:/var/log/hayabusa-host
      - ./secrets/windows-forward-tls:/etc/fluent-bit/tls/windows-forward:ro
    depends_on:
      vector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "--version"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Metrics collection for platform observability.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Dashboard and visualization layer.
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Install ClickHouse datasource plugin so log/event queries can be built in Grafana UI.
      GF_PLUGINS_PREINSTALL: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # SQL-first detection engine (MVP).
  detection:
    image: curlimages/curl:latest
    container_name: detection
    command: ["/bin/sh", "/app/run.sh"]
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123/
      RULE_DIR: /etc/hayabusa/rules
      DETECTION_POLL_SECONDS: "30"
    volumes:
      - ./services/detection/run.sh:/app/run.sh:ro
      - ./configs/rules/detections:/etc/hayabusa/rules:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      vector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /tmp/detection-heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Alert routing sink (local visibility + optional external forwarding).
  alert-sink:
    image: node:22-alpine
    container_name: alert-sink
    command: ["node", "/app/server.js"]
    ports:
      - "5678:8080"
    environment:
      ALERT_ROUTER_LISTEN_PORT: "8080"
      ALERT_ROUTER_EXTERNAL_WEBHOOK_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_TOKEN_FILE:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DEFAULT_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_DEFAULT_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DEFAULT_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_DEFAULT_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DEFAULT_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_DEFAULT_TOKEN_FILE:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DETECTION_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_DETECTION_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DETECTION_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_DETECTION_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_DETECTION_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_DETECTION_TOKEN_FILE:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_CHAT_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_CHAT_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_CHAT_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_CHAT_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_CHAT_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_CHAT_TOKEN_FILE:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_ONCALL_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_ONCALL_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_ONCALL_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_ONCALL_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_ONCALL_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_ONCALL_TOKEN_FILE:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_EMAIL_URL: ${HAYABUSA_EXTERNAL_WEBHOOK_EMAIL_URL:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_EMAIL_TOKEN: ${HAYABUSA_EXTERNAL_WEBHOOK_EMAIL_TOKEN:-}
      ALERT_ROUTER_EXTERNAL_WEBHOOK_EMAIL_TOKEN_FILE: ${HAYABUSA_EXTERNAL_WEBHOOK_EMAIL_TOKEN_FILE:-}
      ALERT_ROUTER_FAIL_ON_FORWARD_ERROR: ${HAYABUSA_ALERT_ROUTER_FAIL_ON_FORWARD_ERROR:-false}
      ALERT_ROUTER_FORWARD_TIMEOUT_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_TIMEOUT_MS:-5000}
      ALERT_ROUTER_FORWARD_RETRY_MAX_ATTEMPTS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_MAX_ATTEMPTS:-3}
      ALERT_ROUTER_FORWARD_RETRY_BASE_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_BASE_MS:-500}
      ALERT_ROUTER_FORWARD_RETRY_MAX_MS: ${HAYABUSA_ALERT_ROUTER_FORWARD_RETRY_MAX_MS:-5000}
    volumes:
      - ./services/alert-router/server.js:/app/server.js:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  clickhouse_data:
  keeper_data:
  nats_data:
  prometheus_data:
  grafana_data:
